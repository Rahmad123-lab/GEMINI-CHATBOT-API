<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>DesaCare AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-emerald-900 to-emerald-700 h-screen flex items-center justify-center">

<div class="w-full max-w-md h-[90vh] bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden">

  <!-- HEADER -->
  <div class="bg-emerald-600 text-white p-4 flex items-center gap-3">
    <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-emerald-600 font-bold">
      AI
    </div>
    <div>
      <h1 class="font-semibold">DesaCare AI</h1>
      <p class="text-xs opacity-80">Online</p>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div id="chat" class="flex-1 p-4 overflow-y-auto space-y-3 bg-gray-50"></div>

  <!-- INPUT -->
  <div class="p-3 border-t flex gap-2">
    <input id="input"
      class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-400"
      placeholder="Ketik pesan..." />

    <button onclick="sendMessage()"
      class="bg-emerald-600 text-white px-4 py-2 rounded-full hover:bg-emerald-700">
      Kirim
    </button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
